<div class="container">
  <div class="left-panel">
    <div class="illustration">
      <img src="assets/images/background-img.png" alt="background" class="img" />
      <div class="illustration-text">
        <h1>Hệ thống quản lý chat đa nền tảng</h1>
        <p>Tiết kiệm thời gian tư vấn và chăm sóc khách hàng</p>
        <div class="dots">
          <span class="dot active"></span>
          <span class="dot active"></span>
          <span class="dot active"></span>
        </div>
      </div>
    </div>
  </div>

  <div class="right-panel">
    <div id="language-container">
      <img src="assets/icons/language.png" alt="global icon" class="icon-global" />
      <select id="language-select" name="languages">
        <option value="vi">Tiếng Việt</option>
        <option value="en">Tiếng Anh</option>
        <option value="jp">Tiếng Nhật</option>
        <option value="cn">Tiếng Trung</option>
      </select>
    </div>

    <div class="login-box">
      <img src="assets/images/vss-chat.png" alt="VSS Logo" class="logo" />
      <h2>Đăng nhập vào tài khoản của bạn</h2>

      <form (ngSubmit)="onSubmit()" #loginForm="ngForm" novalidate>

        <div class="form-group">
          <input type="text" [(ngModel)]="email" name="email" placeholder="Tài khoản" required email
            #emailCtrl="ngModel" [class.error-border]="(emailCtrl.invalid && (emailCtrl.touched || isSubmitted))" />
          <div *ngIf="emailCtrl.invalid && (emailCtrl.touched || isSubmitted)" class="error-msg">
            <span *ngIf="emailCtrl.errors?.['required']">Bạn chưa nhập tài khoản</span>
            <span *ngIf="emailCtrl.errors?.['email']">Email không đúng định dạng</span>
          </div>
        </div>

        <div class="form-group">
          <div class="password-wrapper">
            <input [type]="showPassword ? 'text' : 'password'" [(ngModel)]="password" name="password"
              placeholder="Mật khẩu" required minlength="6" #passCtrl="ngModel"
              [class.error-border]="(passCtrl.invalid && (passCtrl.touched || isSubmitted))" />

            <i class="fas" [class.fa-eye]="showPassword" [class.fa-eye-slash]="!showPassword"
              (click)="togglePassword()">
            </i>
          </div>

          <div *ngIf="passCtrl.invalid && (passCtrl.touched || isSubmitted)" class="error-msg">
            <span *ngIf="passCtrl.errors?.['required']">Bạn chưa nhập mật khẩu</span>
            <span *ngIf="passCtrl.errors?.['minlength']">Mật khẩu phải từ 6 ký tự</span>
          </div>
        </div>

        <div *ngIf="errorMsg" class="error-msg" style="text-align: center; margin-bottom: 10px;">
          {{ errorMsg }}
        </div>

        <div class="options-row">
          <label><input type="checkbox"> Ghi nhớ</label>
          <a routerLink="/forgot-password" class="forgot-password">Quên mật khẩu?</a>
        </div>

        <button type="submit">Đăng nhập</button>

      </form>

      <p class="sign-up">
        Bạn chưa có tài khoản?
        <a routerLink="/register" class="register-link">Đăng ký</a>
      </p>
    </div>
  </div>
</div>
