<div class="container">
  <div class="left-panel">
    <div class="illustration">
      <img src="assets/images/background-img.png" alt="background" class="illustration__img" />
      
      <div class="illustration__text">
        <h1>Hệ thống quản lý chat đa nền tảng</h1>
        <p>Tiết kiệm thời gian tư vấn và chăm sóc khách hàng</p>
      </div>

      <div class="illustration__dots">
        <span class="dot"></span>
        <span class="dot active"></span>
        <span class="dot"></span>
      </div>
    </div>
  </div>

  <div class="right-panel">
    <div class="language-selector">
      <img src="assets/icons/language.png" alt="global icon" class="language-selector__icon" />
      <select id="language-select">
        <option value="vi">Tiếng Việt</option>
        <option value="en">English</option>
      </select>
    </div>

    <div class="login-box reset-container">
      <div class="reset-header">
        <a routerLink="/verify-otp" class="btn-back">
          <i class="fas fa-chevron-left"></i> Quay lại
        </a>
        <span class="header-title">Quên mật khẩu</span>
      </div>

      <div class="login-box__body">
        <div class="icon-area">
          <img src="assets/images/change-password.png" alt="New Password Icon" />
        </div>
        
        <h2 class="login-box__title">Tạo mật khẩu mới</h2>
        <p class="reset-desc">Mật khẩu mới của bạn phải khác với mật khẩu cũ đã được sử dụng.</p>

        <form (ngSubmit)="onSubmit()" #resetForm="ngForm">
          <div class="form-group">
            <div class="password-wrapper">
              <input 
                [type]="showNewPassword ? 'text' : 'password'" 
                [(ngModel)]="newPassword" 
                name="newPassword" 
                placeholder="Mật khẩu mới" 
                required minlength="6"
                #newPwd="ngModel"
                [class.error-border]="newPwd.invalid && newPwd.touched">
              <button type="button" class="password-wrapper__toggle" (click)="toggleNewPassword()">
                <i class="fas" [class.fa-eye]="showNewPassword" [class.fa-eye-slash]="!showNewPassword"></i>
              </button>
            </div>
            <div class="form-group__error" *ngIf="newPwd.invalid && newPwd.touched">
              Mật khẩu phải ít nhất 6 ký tự
            </div>
          </div>

          <div class="form-group">
            <div class="password-wrapper">
              <input 
                [type]="showConfirmPassword ? 'text' : 'password'" 
                [(ngModel)]="confirmPassword" 
                name="confirmPassword" 
                placeholder="Nhập lại mật khẩu mới" 
                required
                #confirmPwd="ngModel"
                [class.error-border]="(confirmPwd.touched && newPassword !== confirmPassword)">
              <button type="button" class="password-wrapper__toggle" (click)="toggleConfirmPassword()">
                <i class="fas" [class.fa-eye]="showConfirmPassword" [class.fa-eye-slash]="!showConfirmPassword"></i>
              </button>
            </div>
            <div class="form-group__error" *ngIf="confirmPwd.touched && newPassword !== confirmPassword">
              Mật khẩu không khớp!
            </div>
          </div>

          <button type="submit" class="btn-submit" [disabled]="resetForm.invalid || (newPassword !== confirmPassword)">
            Xác nhận
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
