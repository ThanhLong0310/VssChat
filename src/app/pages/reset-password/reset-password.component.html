<div class="container">
  <div class="left-panel">
    <div class="illustration">
      <img src="assets/images/background-img.png" alt="background" class="img" />
      <div class="illustration-text">
        <h1>Hệ thống quản lý chat đa nền tảng</h1>
        <p>Tiết kiệm thời gian tư vấn và chăm sóc khách hàng</p>
        <div class="dots">
          <span class="dot active"></span>
          <span class="dot active"></span>
          <span class="dot active"></span>
        </div>
      </div>
    </div>
  </div>

  <div class="right-panel">
    <div id="language-container">
      <img src="assets/icons/language.png" alt="global icon" class="icon-global" />
      <select id="language-select" name="languages">
        <option value="vi">Tiếng Việt</option>
        <option value="en">Tiếng Anh</option>
      </select>
    </div>

    <div class="login-box reset-box">
      
      <div class="form-header">
        <a routerLink="/verify-otp" class="btn-back">
          <i class="fas fa-chevron-left"></i> Quay lại
        </a>
        <span class="header-title">Quên mật khẩu</span>
      </div>

      <div class="form-body">
        <div class="icon-area">
          <img src="assets/images/change-password.png" alt="New Password Icon" />
        </div>
        
        <h2 class="title-red">Tạo mật khẩu mới</h2>
        <p class="desc">Mật khẩu mới của bạn phải khác với mật khẩu cũ đã được sử dụng.</p>

        <form (ngSubmit)="onSubmit()" #resetForm="ngForm">
          
          <div class="input-group-password">
            <input 
              [type]="showNewPassword ? 'text' : 'password'" 
              [(ngModel)]="newPassword" 
              name="newPassword" 
              placeholder="Mật khẩu mới" 
              required
              minlength="6">
            <i class="fas" 
               [class.fa-eye]="showNewPassword" 
               [class.fa-eye-slash]="!showNewPassword"
               (click)="toggleNewPassword()"></i>
          </div>

          <div class="input-group-password">
            <input 
              [type]="showConfirmPassword ? 'text' : 'password'" 
              [(ngModel)]="confirmPassword" 
              name="confirmPassword" 
              placeholder="Nhập lại mật khẩu mới" 
              required>
            <i class="fas" 
               [class.fa-eye]="showConfirmPassword" 
               [class.fa-eye-slash]="!showConfirmPassword"
               (click)="toggleConfirmPassword()"></i>
          </div>

          <div *ngIf="newPassword && confirmPassword && newPassword !== confirmPassword" class="error-text">
            Mật khẩu không khớp!
          </div>

          <button type="submit" [disabled]="resetForm.invalid || (newPassword !== confirmPassword)">
            Xác nhận
          </button>
        </form>
      </div>
      
    </div>
  </div>
</div>
